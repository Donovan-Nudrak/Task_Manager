services:
  db:
    image: postgres:16-alpine
    container_name: task_manager_db
    environment:
      POSTGRES_USER: taskuser
      POSTGRES_PASSWORD: taskpass
      POSTGRES_DB: task_manager 
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskuser -d task_manager"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: task_manager_api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://taskuser:taskpass@db:5432/task_manager
      SECRET_KEY: ${SECRET_KEY:-dev-docker-secret-change-me}
      DEBUG: "false"
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      APP_ENV: prod
      LOG_LEVEL: INFO
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  postgres_data:
